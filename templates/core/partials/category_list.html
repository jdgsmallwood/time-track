{% for cat in categories %}
<div class="flex items-center gap-3 px-4 py-3">
  <div class="w-4 h-4 rounded-full flex-shrink-0" style="background:{{ cat.color }}"></div>
  <span class="flex-1 text-sm font-medium text-gray-900">{{ cat.icon }} {{ cat.name }}</span>
  <button
    hx-delete="/settings/categories/{{ cat.pk }}/"
    hx-confirm="Delete '{{ cat.name }}'?"
    hx-target="closest div"
    hx-swap="outerHTML"
    class="text-xs text-red-500 hover:text-red-700">Delete</button>
</div>
{% empty %}
<p class="px-4 py-6 text-sm text-gray-500 text-center">No categories yet.</p>
{% endfor %}
