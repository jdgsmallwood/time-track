<script>
(function() {
  var data = {
    "id": {{ block.pk }},
    "title": "{{ block.title|escapejs }}",
    "start_time": "{{ block.start_time|time:'H:i' }}",
    "end_time": "{{ block.end_time|time:'H:i' }}",
    "category_color": "{{ block.category.color|default:'#6366f1' }}",
    "category_name": "{{ block.category.name|default:''|escapejs }}",
    "plugin_slug": "{{ block.plugin_slug }}",
    "day_of_week": {% if is_template %}{{ block.day_of_week }}{% else %}{{ block.date.weekday }}{% endif %}
  };
  if (typeof GRID !== 'undefined' && GRID.updateBlock) GRID.updateBlock(data);
  var panel = document.getElementById('edit-panel');
  if (panel) panel.classList.add('hidden');
})();
</script>
