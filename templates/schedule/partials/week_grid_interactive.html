<div class="relative">
  <div id="week-header-outer"
       class="sticky top-0 z-10 overflow-x-hidden bg-gray-50 border-b border-gray-200">
    <div class="min-w-[700px]">
      <div class="grid" style="grid-template-columns: 56px repeat(7, 1fr)">
        <div class="py-2"></div>
        {% for day_name in day_names %}
        <div class="py-2 px-1 text-center border-l border-gray-100">
          <div class="text-xs font-semibold text-gray-600">{{ day_name }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>

  <div id="week-grid-outer" class="relative overflow-x-auto">
    <div class="min-w-[700px]">
      <div id="week-grid" class="relative" style="height:1020px"></div>
    </div>
  </div>
</div>
