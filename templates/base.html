<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}TimeTrack{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/alpine.min.js" defer></script>
  <script src="/static/vendor/interact.min.js" defer></script>
</head>
<body class="h-full" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

<div class="min-h-full flex flex-col">
  <nav class="bg-indigo-700 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <a href="/" class="font-bold text-xl tracking-tight">⏱ TimeTrack</a>
          <div class="hidden md:flex gap-6 text-sm font-medium">
            <a href="/schedule/templates/" class="hover:text-indigo-200 transition-colors">Templates</a>
            <a href="/schedule/weeks/current/" class="hover:text-indigo-200 transition-colors">This Week</a>
            <a href="/schedule/weeks/" class="hover:text-indigo-200 transition-colors">All Weeks</a>
          </div>
        </div>
        <div class="flex items-center gap-4 text-sm">
          <a href="/schedule/history/" class="hover:text-indigo-200 transition-colors">History</a>
          <a href="/running/training-plans/" class="hover:text-indigo-200 transition-colors">Training</a>
          <a href="/settings/categories/" class="hover:text-indigo-200 transition-colors">Categories</a>
          <a href="/gcal/settings/" class="hover:text-indigo-200 transition-colors">Google Cal</a>
          <a href="/strava/settings/" class="hover:text-indigo-200 transition-colors">Strava</a>
          <form method="post" action="/accounts/logout/" class="inline">
            {% csrf_token %}
            <button type="submit" class="hover:text-indigo-200 transition-colors">Logout</button>
          </form>
        </div>
      </div>
    </div>
  </nav>

  {% if messages %}
  <div class="max-w-7xl mx-auto w-full px-4 pt-4">
    {% for message in messages %}
    <div class="rounded-lg px-4 py-3 mb-2 text-sm font-medium
      {% if message.tags == 'error' %}bg-red-100 text-red-800
      {% elif message.tags == 'success' %}bg-green-100 text-green-800
      {% else %}bg-blue-100 text-blue-800{% endif %}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="flex-1">
    {% block content %}{% endblock %}
  </main>
</div>

{% block extra_js %}{% endblock %}
</body>
</html>
