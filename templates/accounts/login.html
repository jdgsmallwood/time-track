<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeTrack — Login</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full flex items-center justify-center">
<div class="w-full max-w-sm">
  <div class="bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-2 text-center">⏱ TimeTrack</h1>
    <p class="text-sm text-gray-500 text-center mb-6">Sign in to your planner</p>

    {% if form.errors %}
    <div class="bg-red-50 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" autofocus required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition-colors">
        Sign in
      </button>
    </form>
  </div>
</div>
</body>
</html>
